# Reusable CI: build a container image and push it to Azure Container Registry.
# Call from any repo:
#   uses: <org>/<repo>/.github/workflows/reusable-ci-container.yml@<ref>
name: Reusable CI - Build and Push Container

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to the Dockerfile
        type: string
        required: false
        default: ./Dockerfile
      context:
        description: Docker build context path
        type: string
        required: false
        default: .
      image_name:
        description: Repository/image name (without registry), e.g. linux-webapp
        type: string
        required: true
      acr_name:
        description: ACR resource name (without .azurecr.io)
        type: string
        required: true
      acr_login_server:
        description: ACR login server, e.g. myacr.azurecr.io
        type: string
        required: true
      image_tag:
        description: Image tag. Empty uses the short git SHA.
        type: string
        required: false
        default: ""
      push_latest:
        description: Also tag and push :latest
        type: boolean
        required: false
        default: true
      push:
        description: Push the image to ACR. Caller should set false for pull_request builds.
        type: boolean
        required: false
        default: true
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
    outputs:
      image:
        description: Fully qualified image reference (registry/name:tag)
        value: ${{ jobs.build-and-push.outputs.image }}
      tag:
        description: Image tag that was built
        value: ${{ jobs.build-and-push.outputs.tag }}
      digest:
        description: Image digest from the push (empty if not pushed)
        value: ${{ jobs.build-and-push.outputs.digest }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_SHA::7}"
          fi
          IMAGE="${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Resolved image: ${IMAGE}"

      - name: Azure login (OIDC)
        if: ${{ inputs.push }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: ${{ inputs.push }}
        run: az acr login --name ${{ inputs.acr_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          TAGS="${{ steps.meta.outputs.image }}"
          if [ "${{ inputs.push_latest }}" = "true" ]; then
            TAGS="${TAGS}"$'\n'"${{ inputs.acr_login_server }}/${{ inputs.image_name }}:latest"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: ${{ inputs.push }}
          tags: ${{ steps.tags.outputs.tags }}
          provenance: false
