# Reusable CD: deploy a container image from ACR to an Azure Linux Web App.
# Call from any repo:
#   uses: <org>/<repo>/.github/workflows/reusable-cd-container.yml@<ref>
name: Reusable CD - Deploy Container to Linux Web App

on:
  workflow_call:
    inputs:
      webapp_name:
        description: Azure Linux Web App name
        type: string
        required: true
      resource_group:
        description: Resource group containing the Web App
        type: string
        required: true
      acr_login_server:
        description: ACR login server, e.g. myacr.azurecr.io
        type: string
        required: true
      image_name:
        description: Repository/image name (without registry)
        type: string
        required: true
      image_tag:
        description: Image tag to deploy
        type: string
        required: false
        default: latest
      restart_after_deploy:
        description: Restart the Web App after updating the container
        type: boolean
        required: false
        default: true
      # TEMP (testing): GitHub Environment disabled so OIDC uses branch subject
      # (ref:refs/heads/main) instead of environment:prod. Re-enable later for approvals.
      # environment:
      #   description: GitHub Environment name (e.g. prod). Use unprotected env names for non-prod.
      #   type: string
      #   required: false
      #   default: prod
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
    outputs:
      image:
        description: Fully qualified image that was deployed
        value: ${{ jobs.deploy.outputs.image }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # TEMP (testing): disabled — re-enable with: environment: ${{ inputs.environment }}
    # environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.img.outputs.image }}

    steps:
      - name: Resolve image
        id: img
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ inputs.acr_login_server }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "Deploying image: ${IMAGE}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container to Linux Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ inputs.webapp_name }}
          resource-group-name: ${{ inputs.resource_group }}
          images: ${{ steps.img.outputs.image }}

      - name: Restart Web App
        if: ${{ inputs.restart_after_deploy }}
        run: |
          az webapp restart \
            --name "${{ inputs.webapp_name }}" \
            --resource-group "${{ inputs.resource_group }}"
