# Thin caller for this repository. Other apps should call the reusable workflow
# directly (or copy this file and change the `with:` / `vars` values).
#
# Required repository Variables:
#   ACR_LOGIN_SERVER, IMAGE_NAME, WEBAPP_NAME, RESOURCE_GROUP
# Required repository Secrets (OIDC):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Manual run: Actions → "CD - Deploy to Linux Web App" → Run workflow
#   - image_tag: e.g. v1.0.0 / latest
#   - slot_name: Azure slot (dev / prod / production)
#   - swap_to_production: optional promote via slot swap after deploy
#
# Auto-deploy: uncomment the workflow_run block below.
name: CD - Deploy to Linux Web App

on:
  # --- Manual deploy (always available) ---
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (e.g. v1.0.0, abc1234, or latest)
        required: true
        type: string
        default: latest
      slot_name:
        description: Azure deployment slot (match names in App Service)
        required: true
        type: choice
        options:
          - devenv
          - prod
          - production
        default: devenv
      swap_to_production:
        description: After deploy, swap this slot with production
        required: false
        type: boolean
        default: false
      # Re-enable when Entra has federated creds for environment:dev / environment:prod
      # github_environment:
      #   description: GitHub Environment (approvals / OIDC)
      #   required: false
      #   type: choice
      #   options: [dev, prod]
      #   default: dev

  # --- Auto-deploy after successful CI (uncomment to enable) ---
  # workflow_run:
  #   workflows: ["CI - Build and Push Container"]
  #   types: [completed]

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    # When workflow_run is enabled: also allow successful non-PR CI completions.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      slot_name: ${{ steps.meta.outputs.slot_name }}
      swap_to_production: ${{ steps.meta.outputs.swap_to_production }}
    steps:
      - name: Resolve deploy inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "slot_name=${{ inputs.slot_name }}" >> "$GITHUB_OUTPUT"
            echo "swap_to_production=${{ inputs.swap_to_production }}" >> "$GITHUB_OUTPUT"
          else
            HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
            HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
            # Tag builds: head_branch is the tag name (e.g. v1.0.0)
            if [[ "${HEAD_BRANCH}" == v* ]]; then
              echo "image_tag=${HEAD_BRANCH}" >> "$GITHUB_OUTPUT"
            else
              echo "image_tag=${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"
            fi
            # Auto path defaults to the devenv slot (change if needed)
            echo "slot_name=devenv" >> "$GITHUB_OUTPUT"
            echo "swap_to_production=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: resolve
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/reusable-cd-container.yml
    with:
      webapp_name: ${{ vars.WEBAPP_NAME }}
      resource_group: ${{ vars.RESOURCE_GROUP }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      image_name: ${{ vars.IMAGE_NAME }}
      image_tag: ${{ needs.resolve.outputs.image_tag }}
      slot_name: ${{ needs.resolve.outputs.slot_name }}
      restart_after_deploy: true
      swap_to_production: ${{ needs.resolve.outputs.swap_to_production == 'true' }}
      # environment: ${{ inputs.github_environment }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
