# Thin caller for this repository. Other apps should call the reusable workflow
# directly (or copy this file and change the `with:` / `vars` values).
#
# Required repository Variables:
#   ACR_LOGIN_SERVER, IMAGE_NAME, WEBAPP_NAME, RESOURCE_GROUP
# Required repository Secrets (OIDC):
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#
# Tip: configure a GitHub Environment named "prod" (or your chosen name) with
# required reviewers for production protection.
name: CD - Deploy to Linux Web App

on:
  workflow_run:
    workflows: ["CI - Build and Push Container"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy (e.g. abc1234 or latest)
        required: true
        type: string
        default: latest
      environment:
        description: GitHub Environment (dev / test / prod)
        required: true
        type: string
        default: prod

permissions:
  contents: read
  id-token: write

jobs:
  resolve:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      environment: ${{ steps.meta.outputs.environment }}
    steps:
      - name: Resolve deploy inputs
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            echo "image_tag=${SHA::7}" >> "$GITHUB_OUTPUT"
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: resolve
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/reusable-cd-container.yml
    with:
      webapp_name: ${{ vars.WEBAPP_NAME }}
      resource_group: ${{ vars.RESOURCE_GROUP }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      image_name: ${{ vars.IMAGE_NAME }}
      image_tag: ${{ needs.resolve.outputs.image_tag }}
      restart_after_deploy: true
      environment: ${{ needs.resolve.outputs.environment }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
